name: Deploy Frontend Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: b7n-fe-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: b7n-fe
  BACKEND_IMAGE_NAME: b7n-be

jobs:
  build-and-push:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      frontend_image: ${{ steps.image.outputs.frontend_image }}
      fallback_backend_image: ${{ steps.image.outputs.fallback_backend_image }}
      image_namespace: ${{ steps.image.outputs.image_namespace }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image names
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAMESPACE="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          FRONTEND_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${GITHUB_SHA}"
          FALLBACK_BACKEND_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${BACKEND_IMAGE_NAME}:latest"

          echo "image_namespace=${IMAGE_NAMESPACE}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${FRONTEND_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "fallback_backend_image=${FALLBACK_BACKEND_IMAGE}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.frontend_image }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT }}
          script: |
            set -euo pipefail
            cd /opt/b7n-deploy
            echo "Updating frontend source..."
            git -C B7N_FE fetch origin
            git -C B7N_FE checkout main
            git -C B7N_FE pull origin main
            echo "Building frontend..."
            docker compose build frontend
            echo "Restarting frontend..."
            docker compose up -d frontend
            docker compose ps
            docker image prune -f