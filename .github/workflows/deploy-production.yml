name: Deploy Backend Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: b7n-be-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: b7n-be
  FRONTEND_IMAGE_NAME: b7n-fe

jobs:
  build-and-push:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.image.outputs.backend_image }}
      fallback_frontend_image: ${{ steps.image.outputs.fallback_frontend_image }}
      image_namespace: ${{ steps.image.outputs.image_namespace }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image names
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAMESPACE="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          BACKEND_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${GITHUB_SHA}"
          FALLBACK_FRONTEND_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${FRONTEND_IMAGE_NAME}:latest"
          echo "image_namespace=${IMAGE_NAMESPACE}" >> "${GITHUB_OUTPUT}"
          echo "backend_image=${BACKEND_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "fallback_frontend_image=${FALLBACK_FRONTEND_IMAGE}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.backend_image }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_namespace }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Debug Secrets
        run: |
          echo "DO_HOST exists: ${{ secrets.DO_HOST != '' }}"
          echo "DO_USER exists: ${{ secrets.DO_USER != '' }}"
          echo "DO_SSH_KEY exists: ${{ secrets.DO_SSH_KEY != '' }}"
          echo "DO_SSH_PORT exists: ${{ secrets.DO_SSH_PORT != '' }}"
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT }}
          script: |
            set -euo pipefail
            cd /opt/b7n-deploy
            echo "Updating backend source..."
            git -C B7N_BE fetch origin
            git -C B7N_BE checkout main
            git -C B7N_BE pull origin main
            echo "Building backend..."
            docker compose build backend
            echo "Restarting backend..."
            docker compose up -d backend
            docker compose ps
            docker image prune -f